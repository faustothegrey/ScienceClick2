<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Deep space background -->
  <rect width="1200" height="800" fill="#0a0e27"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="50" cy="30" r="1.5"/><circle cx="150" cy="80" r="1"/><circle cx="280" cy="20" r="1.5"/>
    <circle cx="400" cy="60" r="1"/><circle cx="520" cy="15" r="1.5"/><circle cx="680" cy="45" r="1"/>
    <circle cx="800" cy="25" r="1.5"/><circle cx="950" cy="70" r="1"/><circle cx="1100" cy="30" r="1.5"/>
    <circle cx="80" cy="150" r="1"/><circle cx="200" cy="200" r="1.5"/><circle cx="350" cy="170" r="1"/>
    <circle cx="500" cy="130" r="1.5"/><circle cx="750" cy="160" r="1"/><circle cx="900" cy="190" r="1.5"/>
    <circle cx="1050" cy="140" r="1"/><circle cx="1150" cy="180" r="1.5"/>
    <circle cx="60" cy="350" r="1"/><circle cx="180" cy="400" r="1.5"/><circle cx="320" cy="380" r="1"/>
    <circle cx="700" cy="350" r="1.5"/><circle cx="850" cy="400" r="1"/>
    <circle cx="30" cy="550" r="1.5"/><circle cx="160" cy="600" r="1"/><circle cx="290" cy="570" r="1.5"/>
    <circle cx="440" cy="620" r="1"/><circle cx="600" cy="560" r="1.5"/><circle cx="780" cy="600" r="1"/>
    <circle cx="950" cy="580" r="1.5"/><circle cx="1100" cy="620" r="1"/><circle cx="1170" cy="560" r="1.5"/>
    <circle cx="70" cy="720" r="1"/><circle cx="250" cy="750" r="1.5"/><circle cx="500" cy="730" r="1"/>
    <circle cx="850" cy="750" r="1.5"/><circle cx="1050" cy="720" r="1"/><circle cx="1150" cy="770" r="1.5"/>
  </g>

  <!-- Orbit lines -->
  <g fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15">
    <ellipse cx="120" cy="400" rx="95" ry="85"/>
    <ellipse cx="120" cy="400" rx="145" ry="130"/>
    <ellipse cx="120" cy="400" rx="210" ry="190"/>
    <ellipse cx="120" cy="400" rx="310" ry="270"/>
    <ellipse cx="120" cy="400" rx="500" ry="340"/>
    <ellipse cx="120" cy="400" rx="700" ry="360"/>
    <ellipse cx="120" cy="400" rx="900" ry="375"/>
  </g>

  <!-- Sun (left edge, partially visible) -->
  <defs>
    <radialGradient id="sunGlow" cx="0.3" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#fff7a0"/>
      <stop offset="30%" stop-color="#ffda44"/>
      <stop offset="60%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="30" cy="400" r="200" fill="url(#sunGlow)" opacity="0.3"/>
  <circle cx="30" cy="400" r="100" fill="#ffda44"/>
  <circle cx="30" cy="400" r="90" fill="#ffe066"/>
  <circle cx="20" cy="390" r="75" fill="#fff0a0" opacity="0.5"/>

  <!-- Mercury -->
  <circle cx="170" cy="330" r="8" fill="#b0a090"/>
  <circle cx="168" cy="328" r="6" fill="#c4b8a8" opacity="0.6"/>
  <circle cx="172" cy="332" r="2" fill="#8a7e6e"/>

  <!-- Venus -->
  <circle cx="240" cy="290" r="14" fill="#e8c46a"/>
  <circle cx="237" cy="287" r="10" fill="#f0d88a" opacity="0.5"/>
  <circle cx="244" cy="294" r="4" fill="#d4a84a" opacity="0.6"/>

  <!-- Earth -->
  <circle cx="320" cy="250" r="16" fill="#4a90d9"/>
  <circle cx="315" cy="245" r="8" fill="#5da85d"/>
  <circle cx="328" cy="255" r="6" fill="#5da85d"/>
  <circle cx="310" cy="258" r="4" fill="#5da85d"/>
  <!-- Moon -->
  <circle cx="345" cy="240" r="4" fill="#d0d0d0"/>

  <!-- Mars -->
  <circle cx="420" cy="210" r="12" fill="#c1440e"/>
  <circle cx="418" cy="208" r="8" fill="#d4603a" opacity="0.5"/>
  <circle cx="424" cy="214" r="3" fill="#a03008"/>

  <!-- Asteroid Belt -->
  <g fill="#8a8070" opacity="0.7">
    <circle cx="545" cy="160" r="2.5"/><circle cx="560" cy="175" r="1.5"/><circle cx="530" cy="190" r="3"/>
    <circle cx="575" cy="145" r="2"/><circle cx="510" cy="200" r="2.5"/><circle cx="590" cy="165" r="1.5"/>
    <circle cx="555" cy="210" r="2"/><circle cx="520" cy="150" r="1.5"/><circle cx="600" cy="185" r="2.5"/>
    <circle cx="540" cy="225" r="1.5"/><circle cx="580" cy="130" r="2"/><circle cx="505" cy="175" r="1.5"/>
    <circle cx="565" cy="200" r="2"/><circle cx="615" cy="170" r="1.5"/><circle cx="495" cy="210" r="2"/>
    <circle cx="550" cy="140" r="1.5"/><circle cx="585" cy="220" r="2"/><circle cx="535" cy="205" r="1.5"/>
  </g>

  <!-- Jupiter -->
  <circle cx="700" cy="200" r="45" fill="#c4956a"/>
  <ellipse cx="700" cy="188" rx="40" ry="5" fill="#d4aa7a" opacity="0.5"/>
  <ellipse cx="700" cy="198" rx="42" ry="4" fill="#b07850" opacity="0.6"/>
  <ellipse cx="700" cy="208" rx="38" ry="4" fill="#d4aa7a" opacity="0.4"/>
  <ellipse cx="700" cy="218" rx="40" ry="3" fill="#b07850" opacity="0.5"/>
  <!-- Great Red Spot -->
  <ellipse cx="720" cy="210" rx="10" ry="7" fill="#c05030" opacity="0.7"/>

  <!-- Saturn -->
  <circle cx="900" cy="280" r="38" fill="#e0c880"/>
  <ellipse cx="900" cy="278" rx="34" ry="4" fill="#d4b060" opacity="0.4"/>
  <ellipse cx="900" cy="288" rx="32" ry="3" fill="#c8a040" opacity="0.4"/>
  <!-- Saturn's rings -->
  <ellipse cx="900" cy="280" rx="70" ry="18" fill="none" stroke="#d4b870" stroke-width="8" opacity="0.5"/>
  <ellipse cx="900" cy="280" rx="60" ry="15" fill="none" stroke="#e8d8a0" stroke-width="4" opacity="0.4"/>
  <ellipse cx="900" cy="280" rx="78" ry="20" fill="none" stroke="#c4a850" stroke-width="3" opacity="0.3"/>

  <!-- Uranus (bonus, smaller) -->
  <circle cx="1050" cy="370" r="22" fill="#7ec8e3"/>
  <circle cx="1048" cy="368" r="18" fill="#a0dcea" opacity="0.4"/>

  <!-- Neptune (bonus, smaller) -->
  <circle cx="1140" cy="440" r="20" fill="#4060c0"/>
  <circle cx="1138" cy="438" r="16" fill="#6080e0" opacity="0.4"/>
</svg>
