<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#1a1a3e"/>
  <defs>
    <radialGradient id="bgGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#2a2a5e"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGlow)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
  </g>

  <!-- DNA Double Helix — Left backbone (strand 1) -->
  <path d="M350,50 Q550,100 400,175 Q250,250 450,325 Q650,400 400,475 Q250,530 450,600 Q600,660 400,730"
        fill="none" stroke="#42a5f5" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- DNA Double Helix — Right backbone (strand 2) -->
  <path d="M650,50 Q450,100 600,175 Q750,250 550,325 Q350,400 600,475 Q750,530 550,600 Q400,660 600,730"
        fill="none" stroke="#ef5350" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- Sugar-phosphate backbone highlights -->
  <path d="M350,50 Q550,100 400,175 Q250,250 450,325 Q650,400 400,475 Q250,530 450,600 Q600,660 400,730"
        fill="none" stroke="#90caf9" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M650,50 Q450,100 600,175 Q750,250 550,325 Q350,400 600,475 Q750,530 550,600 Q400,660 600,730"
        fill="none" stroke="#ef9a9a" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- Base pairs (rungs connecting the two strands) -->
  <!-- Rung 1: A-T -->
  <line x1="388" y1="88" x2="612" y2="88" stroke="#66bb6a" stroke-width="5" opacity="0.8"/>
  <circle cx="460" cy="88" r="8" fill="#66bb6a"/><circle cx="540" cy="88" r="8" fill="#ffd54f"/>

  <!-- Rung 2: C-G -->
  <line x1="370" y1="145" x2="630" y2="145" stroke="#ce93d8" stroke-width="5" opacity="0.8"/>
  <circle cx="450" cy="145" r="8" fill="#ce93d8"/><circle cx="550" cy="145" r="8" fill="#ff8a65"/>

  <!-- Rung 3: T-A -->
  <line x1="365" y1="205" x2="640" y2="205" stroke="#ffd54f" stroke-width="5" opacity="0.8"/>
  <circle cx="445" cy="205" r="8" fill="#ffd54f"/><circle cx="560" cy="205" r="8" fill="#66bb6a"/>

  <!-- Rung 4: G-C -->
  <line x1="395" y1="265" x2="610" y2="265" stroke="#ff8a65" stroke-width="5" opacity="0.8"/>
  <circle cx="460" cy="265" r="8" fill="#ff8a65"/><circle cx="545" cy="265" r="8" fill="#ce93d8"/>

  <!-- Rung 5: A-T -->
  <line x1="430" y1="325" x2="570" y2="325" stroke="#66bb6a" stroke-width="5" opacity="0.8"/>
  <circle cx="470" cy="325" r="8" fill="#66bb6a"/><circle cx="530" cy="325" r="8" fill="#ffd54f"/>

  <!-- Rung 6: C-G -->
  <line x1="400" y1="385" x2="600" y2="385" stroke="#ce93d8" stroke-width="5" opacity="0.8"/>
  <circle cx="455" cy="385" r="8" fill="#ce93d8"/><circle cx="545" cy="385" r="8" fill="#ff8a65"/>

  <!-- Rung 7: T-A -->
  <line x1="370" y1="445" x2="630" y2="445" stroke="#ffd54f" stroke-width="5" opacity="0.8"/>
  <circle cx="445" cy="445" r="8" fill="#ffd54f"/><circle cx="555" cy="445" r="8" fill="#66bb6a"/>

  <!-- Rung 8: G-C -->
  <line x1="395" y1="505" x2="610" y2="505" stroke="#ff8a65" stroke-width="5" opacity="0.8"/>
  <circle cx="460" cy="505" r="8" fill="#ff8a65"/><circle cx="545" cy="505" r="8" fill="#ce93d8"/>

  <!-- Rung 9: A-T -->
  <line x1="430" y1="565" x2="570" y2="565" stroke="#66bb6a" stroke-width="5" opacity="0.8"/>
  <circle cx="470" cy="565" r="8" fill="#66bb6a"/><circle cx="530" cy="565" r="8" fill="#ffd54f"/>

  <!-- Rung 10: C-G -->
  <line x1="400" y1="630" x2="600" y2="630" stroke="#ce93d8" stroke-width="5" opacity="0.8"/>
  <circle cx="455" cy="630" r="8" fill="#ce93d8"/><circle cx="545" cy="630" r="8" fill="#ff8a65"/>

  <!-- Rung 11: T-A -->
  <line x1="370" y1="690" x2="630" y2="690" stroke="#ffd54f" stroke-width="5" opacity="0.8"/>
  <circle cx="445" cy="690" r="8" fill="#ffd54f"/><circle cx="555" cy="690" r="8" fill="#66bb6a"/>

  <!-- Phosphate groups on backbone (small circles) -->
  <g fill="#42a5f5" opacity="0.7">
    <circle cx="370" cy="110" r="6"/><circle cx="367" cy="175" r="6"/>
    <circle cx="390" cy="240" r="6"/><circle cx="435" cy="300" r="6"/>
    <circle cx="415" cy="360" r="6"/><circle cx="380" cy="420" r="6"/>
    <circle cx="395" cy="480" r="6"/><circle cx="435" cy="540" r="6"/>
    <circle cx="410" cy="600" r="6"/><circle cx="380" cy="660" r="6"/>
  </g>
  <g fill="#ef5350" opacity="0.7">
    <circle cx="630" cy="110" r="6"/><circle cx="635" cy="175" r="6"/>
    <circle cx="615" cy="240" r="6"/><circle cx="565" cy="300" r="6"/>
    <circle cx="590" cy="360" r="6"/><circle cx="620" cy="420" r="6"/>
    <circle cx="605" cy="480" r="6"/><circle cx="565" cy="540" r="6"/>
    <circle cx="590" cy="600" r="6"/><circle cx="620" cy="660" r="6"/>
  </g>

  <!-- Sugar (deoxyribose) pentagons on backbone -->
  <g fill="none" stroke="#64b5f6" stroke-width="1.5" opacity="0.4">
    <polygon points="370,120 365,130 370,140 378,136 378,124"/>
    <polygon points="390,250 385,260 390,270 398,266 398,254"/>
    <polygon points="415,370 410,380 415,390 423,386 423,374"/>
    <polygon points="395,490 390,500 395,510 403,506 403,494"/>
    <polygon points="410,610 405,620 410,630 418,626 418,614"/>
  </g>

  <!-- Nucleotide zoom bubble (right side) -->
  <circle cx="950" cy="250" r="100" fill="#2a2a5e" stroke="#64b5f6" stroke-width="2" opacity="0.8"/>
  <!-- Zoom line -->
  <line x1="640" y1="205" x2="855" y2="240" stroke="#64b5f6" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Nucleotide inside bubble -->
  <!-- Phosphate -->
  <circle cx="910" cy="210" r="14" fill="#42a5f5" opacity="0.7"/>
  <!-- Sugar -->
  <polygon points="910,235 900,248 908,258 920,255 922,242" fill="#64b5f6" opacity="0.6" stroke="#42a5f5" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="930" y="248" width="30" height="18" rx="4" fill="#66bb6a" opacity="0.7" stroke="#4caf50" stroke-width="1.5"/>
  <!-- Connections -->
  <line x1="910" y1="224" x2="910" y2="235" stroke="#90caf9" stroke-width="2"/>
  <line x1="920" y1="250" x2="930" y2="254" stroke="#90caf9" stroke-width="2"/>

  <!-- Chromosome zoom (bottom right) -->
  <g transform="translate(980, 600)">
    <circle cx="0" cy="0" r="80" fill="#2a2a5e" stroke="#ef5350" stroke-width="2" opacity="0.8"/>
    <!-- X-shaped chromosome -->
    <path d="M-20,-50 Q-5,-10 -20,50" fill="none" stroke="#ef5350" stroke-width="10" stroke-linecap="round"/>
    <path d="M20,-50 Q5,-10 20,50" fill="none" stroke="#ef5350" stroke-width="10" stroke-linecap="round"/>
    <!-- Centromere -->
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#ef9a9a" stroke="#ef5350" stroke-width="2"/>
  </g>
  <!-- Line from helix to chromosome -->
  <line x1="600" y1="730" x2="910" y2="600" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Base pair legend (bottom left) -->
  <g transform="translate(80, 650)" opacity="0.6">
    <circle cx="0" cy="0" r="6" fill="#66bb6a"/><text x="12" y="4" fill="#a0a0c0" font-size="12" font-family="sans-serif">A - Adenine</text>
    <circle cx="0" cy="25" r="6" fill="#ffd54f"/><text x="12" y="29" fill="#a0a0c0" font-size="12" font-family="sans-serif">T - Thymine</text>
    <circle cx="0" cy="50" r="6" fill="#ce93d8"/><text x="12" y="54" fill="#a0a0c0" font-size="12" font-family="sans-serif">C - Cytosine</text>
    <circle cx="0" cy="75" r="6" fill="#ff8a65"/><text x="12" y="79" fill="#a0a0c0" font-size="12" font-family="sans-serif">G - Guanine</text>
  </g>
</svg>
