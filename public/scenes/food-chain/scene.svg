<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background — savanna -->
  <rect width="1200" height="800" fill="#fce4b0"/>
  <defs>
    <linearGradient id="savSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#fce4b0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="450" fill="url(#savSky)"/>

  <!-- Sun -->
  <circle cx="600" cy="80" r="55" fill="#ffd54f"/>
  <circle cx="600" cy="80" r="48" fill="#ffee58"/>
  <!-- Sun rays -->
  <g stroke="#ffd54f" stroke-width="2.5" opacity="0.4">
    <line x1="600" y1="15" x2="600" y2="0"/><line x1="600" y1="145" x2="600" y2="160"/>
    <line x1="535" y1="80" x2="520" y2="80"/><line x1="665" y1="80" x2="680" y2="80"/>
    <line x1="554" y1="34" x2="542" y2="22"/><line x1="646" y1="34" x2="658" y2="22"/>
    <line x1="554" y1="126" x2="542" y2="138"/><line x1="646" y1="126" x2="658" y2="138"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="450" width="1200" height="350" fill="#c5a55a"/>
  <rect x="0" y="450" width="1200" height="10" fill="#d4b86a"/>

  <!-- Underground (soil) -->
  <rect x="0" y="650" width="1200" height="150" fill="#a08040"/>

  <!-- Grass/Producer area (left) -->
  <g transform="translate(100, 350)">
    <!-- Grass tufts -->
    <rect x="0" y="60" width="200" height="50" rx="4" fill="#81c784"/>
    <g fill="#66bb6a">
      <path d="M20,60 Q25,20 30,60"/><path d="M40,60 Q48,15 55,60"/><path d="M65,60 Q70,25 75,60"/>
      <path d="M90,60 Q95,20 100,60"/><path d="M110,60 Q118,10 125,60"/><path d="M135,60 Q140,25 145,60"/>
      <path d="M155,60 Q160,18 165,60"/><path d="M175,60 Q182,22 188,60"/>
    </g>
    <g fill="#4caf50">
      <path d="M30,60 Q38,30 45,60"/><path d="M70,60 Q75,35 82,60"/><path d="M105,60 Q112,28 118,60"/>
      <path d="M145,60 Q152,32 158,60"/><path d="M180,60 Q185,38 192,60"/>
    </g>
    <!-- Small flowers -->
    <circle cx="50" cy="40" r="5" fill="#ffeb3b"/><circle cx="130" cy="35" r="4" fill="#ff9800"/>
    <circle cx="170" cy="42" r="5" fill="#ffeb3b"/>
    <!-- Roots below -->
    <g fill="none" stroke="#8d6e63" stroke-width="2" opacity="0.4">
      <path d="M50,110 Q40,140 30,170"/><path d="M100,110 Q95,145 85,175"/>
      <path d="M150,110 Q155,140 165,170"/>
    </g>
  </g>

  <!-- Arrow: Sun → Producer -->
  <g stroke="#ffc107" stroke-width="3" fill="#ffc107" opacity="0.6">
    <line x1="560" y1="130" x2="250" y2="340"/>
    <polygon points="250,340 258,326 264,334"/>
  </g>

  <!-- Herbivore (center-left) — Zebra/deer -->
  <g transform="translate(450, 360)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="60" ry="35" fill="#d7ccc8" stroke="#8d6e63" stroke-width="2"/>
    <!-- Head -->
    <ellipse cx="55" cy="-20" rx="22" ry="16" fill="#d7ccc8" stroke="#8d6e63" stroke-width="2"/>
    <!-- Eye -->
    <circle cx="62" cy="-24" r="3" fill="#4e342e"/>
    <!-- Ear -->
    <ellipse cx="50" cy="-38" rx="6" ry="10" fill="#bcaaa4" stroke="#8d6e63" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="-30" y1="30" x2="-35" y2="75" stroke="#8d6e63" stroke-width="5" stroke-linecap="round"/>
    <line x1="-10" y1="30" x2="-12" y2="75" stroke="#8d6e63" stroke-width="5" stroke-linecap="round"/>
    <line x1="15" y1="30" x2="13" y2="75" stroke="#8d6e63" stroke-width="5" stroke-linecap="round"/>
    <line x1="35" y1="28" x2="38" y2="72" stroke="#8d6e63" stroke-width="5" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M-55,0 Q-70,-10 -65,-25" fill="none" stroke="#8d6e63" stroke-width="2.5"/>
    <!-- Stripes -->
    <g stroke="#5d4037" stroke-width="2" opacity="0.3">
      <line x1="-20" y1="-20" x2="-15" y2="20"/><line x1="0" y1="-25" x2="5" y2="22"/>
      <line x1="20" y1="-22" x2="22" y2="20"/>
    </g>
  </g>

  <!-- Arrow: Producer → Herbivore -->
  <g stroke="#4caf50" stroke-width="3" fill="#4caf50" opacity="0.6">
    <line x1="310" y1="390" x2="385" y2="370"/>
    <polygon points="385,370 373,365 375,375"/>
  </g>

  <!-- Carnivore (right) — Lion -->
  <g transform="translate(780, 340)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="70" ry="40" fill="#e8b84a" stroke="#c49030" stroke-width="2"/>
    <!-- Mane -->
    <circle cx="-45" cy="-15" r="35" fill="#c49030" opacity="0.6"/>
    <!-- Head -->
    <ellipse cx="-65" cy="-15" rx="25" ry="20" fill="#e8b84a" stroke="#c49030" stroke-width="2"/>
    <!-- Eye -->
    <circle cx="-72" cy="-20" r="4" fill="#4e342e"/>
    <!-- Nose -->
    <ellipse cx="-82" cy="-12" rx="5" ry="3" fill="#8d6e63"/>
    <!-- Mouth -->
    <path d="M-82,-9 Q-78,-5 -75,-8" fill="none" stroke="#8d6e63" stroke-width="1.5"/>
    <!-- Ears -->
    <circle cx="-55" cy="-38" r="8" fill="#c49030"/><circle cx="-55" cy="-38" r="5" fill="#e8b84a"/>
    <!-- Legs -->
    <line x1="-30" y1="35" x2="-35" y2="80" stroke="#c49030" stroke-width="6" stroke-linecap="round"/>
    <line x1="-5" y1="35" x2="-8" y2="80" stroke="#c49030" stroke-width="6" stroke-linecap="round"/>
    <line x1="25" y1="33" x2="22" y2="78" stroke="#c49030" stroke-width="6" stroke-linecap="round"/>
    <line x1="50" y1="30" x2="52" y2="75" stroke="#c49030" stroke-width="6" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M65,0 Q90,10 95,-15 Q98,-25 95,-30" fill="none" stroke="#c49030" stroke-width="3"/>
    <circle cx="95" cy="-32" r="6" fill="#8d6e63"/>
  </g>

  <!-- Arrow: Herbivore → Carnivore -->
  <g stroke="#ff9800" stroke-width="3" fill="#ff9800" opacity="0.6">
    <line x1="520" y1="360" x2="700" y2="345"/>
    <polygon points="700,345 688,340 690,350"/>
  </g>

  <!-- Decomposer (bottom center) — Mushrooms and worms -->
  <g transform="translate(550, 530)">
    <!-- Soil mound -->
    <ellipse cx="0" cy="20" rx="80" ry="25" fill="#8d6e63"/>
    <!-- Mushroom 1 -->
    <rect x="-25" y="-10" width="6" height="30" fill="#e0e0e0"/>
    <ellipse cx="-22" cy="-12" rx="16" ry="10" fill="#ef5350"/>
    <circle cx="-28" cy="-14" r="3" fill="#ffffff" opacity="0.6"/>
    <circle cx="-16" cy="-10" r="2" fill="#ffffff" opacity="0.6"/>
    <!-- Mushroom 2 -->
    <rect x="15" y="-5" width="5" height="25" fill="#e0e0e0"/>
    <ellipse cx="17" cy="-7" rx="14" ry="9" fill="#ff8a65"/>
    <circle cx="12" cy="-9" r="2.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="22" cy="-5" r="2" fill="#ffffff" opacity="0.6"/>
    <!-- Mushroom 3 (small) -->
    <rect x="40" y="2" width="4" height="18" fill="#e0e0e0"/>
    <ellipse cx="42" cy="1" rx="10" ry="7" fill="#ce93d8"/>
    <!-- Worm -->
    <path d="M-50,25 Q-40,15 -25,25 Q-10,35 5,25 Q15,18 25,25" fill="none" stroke="#ff8a65" stroke-width="4" stroke-linecap="round"/>
    <!-- Bacteria dots -->
    <g fill="#a5d6a7" opacity="0.5">
      <circle cx="-60" cy="30" r="3"/><circle cx="-45" cy="40" r="2"/>
      <circle cx="50" cy="35" r="3"/><circle cx="65" cy="28" r="2"/>
    </g>
  </g>

  <!-- Arrow: Dead matter → Decomposer -->
  <g stroke="#8d6e63" stroke-width="2.5" fill="#8d6e63" opacity="0.5">
    <!-- From herbivore area down -->
    <line x1="450" y1="450" x2="500" y2="520"/>
    <polygon points="500,520 494,508 502,510"/>
    <!-- From carnivore area down -->
    <line x1="780" y1="430" x2="640" y2="520"/>
    <polygon points="640,520 646,508 650,514"/>
  </g>

  <!-- Nutrients arrow: Decomposer → soil → Producer -->
  <g stroke="#66bb6a" stroke-width="2.5" fill="#66bb6a" opacity="0.5">
    <path d="M470,560 Q350,600 250,560 Q200,540 180,480" fill="none"/>
    <polygon points="180,480 176,494 186,490"/>
  </g>

  <!-- Acacia tree (background) -->
  <g transform="translate(1050, 300)">
    <rect x="-8" y="0" width="16" height="150" fill="#8d6e63"/>
    <ellipse cx="0" cy="-10" rx="80" ry="35" fill="#81c784" opacity="0.5"/>
    <ellipse cx="-20" cy="-20" rx="50" ry="25" fill="#66bb6a" opacity="0.5"/>
    <ellipse cx="25" cy="-15" rx="45" ry="22" fill="#4caf50" opacity="0.4"/>
  </g>

  <!-- Birds in sky -->
  <g fill="none" stroke="#555" stroke-width="1.5">
    <path d="M300,120 Q304,114 308,120 Q312,114 316,120"/>
    <path d="M340,140 Q344,134 348,140 Q352,134 356,140"/>
  </g>
</svg>
