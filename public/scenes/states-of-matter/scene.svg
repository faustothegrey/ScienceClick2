<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f5f5f5"/>

  <!-- Three containers side by side -->

  <!-- ===== SOLID (left) ===== -->
  <!-- Container/beaker -->
  <rect x="60" y="200" width="280" height="350" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="3"/>
  <rect x="60" y="200" width="280" height="30" rx="8" fill="none" stroke="#90caf9" stroke-width="3"/>
  <!-- Solid block inside -->
  <rect x="100" y="350" width="200" height="160" rx="4" fill="#7986cb" stroke="#5c6bc0" stroke-width="2"/>
  <!-- Tightly packed molecules in grid -->
  <g fill="#3f51b5" opacity="0.8">
    <circle cx="130" cy="380" r="12"/><circle cx="160" cy="380" r="12"/><circle cx="190" cy="380" r="12"/>
    <circle cx="220" cy="380" r="12"/><circle cx="250" cy="380" r="12"/><circle cx="280" cy="380" r="12"/>
    <circle cx="130" cy="410" r="12"/><circle cx="160" cy="410" r="12"/><circle cx="190" cy="410" r="12"/>
    <circle cx="220" cy="410" r="12"/><circle cx="250" cy="410" r="12"/><circle cx="280" cy="410" r="12"/>
    <circle cx="130" cy="440" r="12"/><circle cx="160" cy="440" r="12"/><circle cx="190" cy="440" r="12"/>
    <circle cx="220" cy="440" r="12"/><circle cx="250" cy="440" r="12"/><circle cx="280" cy="440" r="12"/>
    <circle cx="130" cy="470" r="12"/><circle cx="160" cy="470" r="12"/><circle cx="190" cy="470" r="12"/>
    <circle cx="220" cy="470" r="12"/><circle cx="250" cy="470" r="12"/><circle cx="280" cy="470" r="12"/>
  </g>
  <!-- Bonds between molecules -->
  <g stroke="#5c6bc0" stroke-width="1" opacity="0.3">
    <line x1="142" y1="380" x2="148" y2="380"/><line x1="172" y1="380" x2="178" y2="380"/>
    <line x1="202" y1="380" x2="208" y2="380"/><line x1="232" y1="380" x2="238" y2="380"/>
    <line x1="130" y1="392" x2="130" y2="398"/><line x1="160" y1="392" x2="160" y2="398"/>
    <line x1="190" y1="392" x2="190" y2="398"/><line x1="220" y1="392" x2="220" y2="398"/>
    <line x1="250" y1="392" x2="250" y2="398"/>
  </g>
  <!-- Ice cube visual -->
  <rect x="145" y="260" width="110" height="70" rx="6" fill="#bbdefb" stroke="#64b5f6" stroke-width="2" opacity="0.6"/>
  <line x1="155" y1="295" x2="245" y2="295" stroke="#64b5f6" stroke-width="1" opacity="0.3"/>

  <!-- ===== LIQUID (center) ===== -->
  <!-- Container/beaker -->
  <rect x="460" y="200" width="280" height="350" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="3"/>
  <rect x="460" y="200" width="280" height="30" rx="8" fill="none" stroke="#90caf9" stroke-width="3"/>
  <!-- Water level -->
  <path d="M463,340 Q520,335 600,340 Q680,345 737,338 L737,547 L463,547 Z" fill="#64b5f6" opacity="0.4"/>
  <!-- Surface ripple -->
  <path d="M463,340 Q520,332 600,340 Q680,348 737,338" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>
  <!-- Loosely packed molecules -->
  <g fill="#1e88e5" opacity="0.7">
    <circle cx="500" cy="370" r="12"/><circle cx="540" cy="385" r="12"/><circle cx="575" cy="365" r="12"/>
    <circle cx="620" cy="380" r="12"/><circle cx="660" cy="370" r="12"/><circle cx="700" cy="385" r="12"/>
    <circle cx="485" cy="420" r="12"/><circle cx="530" cy="430" r="12"/><circle cx="580" cy="415" r="12"/>
    <circle cx="630" cy="425" r="12"/><circle cx="680" cy="418" r="12"/><circle cx="715" cy="430" r="12"/>
    <circle cx="510" cy="470" r="12"/><circle cx="555" cy="460" r="12"/><circle cx="605" cy="472" r="12"/>
    <circle cx="650" cy="465" r="12"/><circle cx="695" cy="475" r="12"/>
    <circle cx="490" cy="510" r="12"/><circle cx="545" cy="505" r="12"/><circle cx="600" cy="515" r="12"/>
    <circle cx="660" cy="508" r="12"/><circle cx="710" cy="518" r="12"/>
  </g>
  <!-- Water droplet icon above -->
  <path d="M600,260 Q590,280 585,295 Q580,310 600,315 Q620,310 615,295 Q610,280 600,260 Z" fill="#42a5f5" opacity="0.5"/>

  <!-- ===== GAS (right) ===== -->
  <!-- Container/beaker -->
  <rect x="860" y="200" width="280" height="350" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="3"/>
  <rect x="860" y="200" width="280" height="30" rx="8" fill="none" stroke="#90caf9" stroke-width="3"/>
  <!-- Widely scattered molecules with motion lines -->
  <g fill="#e57373" opacity="0.6">
    <circle cx="900" cy="260" r="10"/><circle cx="980" cy="290" r="10"/>
    <circle cx="1060" cy="250" r="10"/><circle cx="1100" cy="330" r="10"/>
    <circle cx="920" cy="370" r="10"/><circle cx="1000" cy="400" r="10"/>
    <circle cx="1080" cy="380" r="10"/><circle cx="940" cy="460" r="10"/>
    <circle cx="1040" cy="470" r="10"/><circle cx="1110" cy="450" r="10"/>
    <circle cx="890" cy="510" r="10"/><circle cx="970" cy="520" r="10"/>
    <circle cx="1060" cy="510" r="10"/><circle cx="1100" cy="280" r="10"/>
  </g>
  <!-- Motion arrows for gas molecules -->
  <g stroke="#e57373" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M912,258 L920,250"/><path d="M990,285 L998,278"/>
    <path d="M1070,248 L1076,240"/><path d="M928,365 L935,358"/>
    <path d="M1010,396 L1018,388"/><path d="M1090,376 L1098,368"/>
    <path d="M950,456 L958,448"/><path d="M1050,466 L1058,458"/>
    <path d="M898,506 L905,498"/><path d="M978,516 L986,508"/>
  </g>
  <!-- Steam wisps above -->
  <g fill="none" stroke="#e0e0e0" stroke-width="2" opacity="0.3">
    <path d="M960,240 Q955,225 960,210 Q965,195 960,180"/>
    <path d="M1020,235 Q1015,220 1020,205 Q1025,190 1020,175"/>
    <path d="M1080,240 Q1075,225 1080,210"/>
  </g>

  <!-- ===== TRANSITION ARROWS ===== -->

  <!-- Melting arrow (solid → liquid) -->
  <g transform="translate(370, 350)">
    <path d="M0,0 L60,0" stroke="#ff9800" stroke-width="3" fill="none"/>
    <polygon points="60,0 50,-6 50,6" fill="#ff9800"/>
  </g>

  <!-- Evaporation arrow (liquid → gas) -->
  <g transform="translate(770, 350)">
    <path d="M0,0 L60,0" stroke="#f44336" stroke-width="3" fill="none"/>
    <polygon points="60,0 50,-6 50,6" fill="#f44336"/>
  </g>

  <!-- Condensation arrow (gas → liquid, below) -->
  <g transform="translate(770, 430)">
    <path d="M60,0 L0,0" stroke="#2196f3" stroke-width="3" fill="none"/>
    <polygon points="0,0 10,-6 10,6" fill="#2196f3"/>
  </g>

  <!-- Freezing arrow (liquid → solid, below) -->
  <g transform="translate(370, 430)">
    <path d="M60,0 L0,0" stroke="#5c6bc0" stroke-width="3" fill="none"/>
    <polygon points="0,0 10,-6 10,6" fill="#5c6bc0"/>
  </g>

  <!-- Arrow labels -->
  <g font-size="11" font-family="sans-serif" fill="#666">
    <text x="370" y="340" font-weight="bold" fill="#ff9800">Melting</text>
    <text x="770" y="340" font-weight="bold" fill="#f44336">Evaporation</text>
    <text x="762" y="460" font-weight="bold" fill="#2196f3">Condensation</text>
    <text x="365" y="460" font-weight="bold" fill="#5c6bc0">Freezing</text>
  </g>

  <!-- State labels -->
  <g font-size="28" font-family="sans-serif" font-weight="bold" text-anchor="middle">
    <text x="200" y="595" fill="#5c6bc0">SOLID</text>
    <text x="600" y="595" fill="#1e88e5">LIQUID</text>
    <text x="1000" y="595" fill="#e57373">GAS</text>
  </g>

  <!-- Temperature scale at bottom -->
  <g transform="translate(100, 680)">
    <rect x="0" y="0" width="1000" height="12" rx="6" fill="url(#tempGrad)"/>
    <defs>
      <linearGradient id="tempGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#5c6bc0"/>
        <stop offset="50%" stop-color="#42a5f5"/>
        <stop offset="100%" stop-color="#ef5350"/>
      </linearGradient>
    </defs>
    <text x="0" y="35" font-size="12" font-family="sans-serif" fill="#666">Cold</text>
    <text x="1000" y="35" font-size="12" font-family="sans-serif" fill="#666" text-anchor="end">Hot</text>
    <text x="500" y="35" font-size="12" font-family="sans-serif" fill="#666" text-anchor="middle">Temperature →</text>
  </g>
</svg>
