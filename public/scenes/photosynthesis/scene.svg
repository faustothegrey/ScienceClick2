<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Sky -->
  <rect width="1200" height="800" fill="#dceefb"/>
  <defs>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#dceefb"/>
    </linearGradient>
    <radialGradient id="sunG" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffee58"/>
      <stop offset="100%" stop-color="#ffca28" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#skyG)"/>

  <!-- Sun with rays -->
  <circle cx="200" cy="120" r="120" fill="url(#sunG)" opacity="0.5"/>
  <circle cx="200" cy="120" r="55" fill="#ffd54f"/>
  <circle cx="200" cy="120" r="48" fill="#ffee58"/>
  <!-- Sun rays -->
  <g stroke="#ffd54f" stroke-width="3" opacity="0.5">
    <line x1="200" y1="40" x2="200" y2="15"/><line x1="200" y1="200" x2="200" y2="225"/>
    <line x1="120" y1="120" x2="95" y2="120"/><line x1="280" y1="120" x2="305" y2="120"/>
    <line x1="143" y1="63" x2="125" y2="45"/><line x1="257" y1="63" x2="275" y2="45"/>
    <line x1="143" y1="177" x2="125" y2="195"/><line x1="257" y1="177" x2="275" y2="195"/>
  </g>

  <!-- Sunlight arrows going to leaf -->
  <g stroke="#ffc107" stroke-width="2.5" fill="#ffc107" opacity="0.6">
    <line x1="280" y1="170" x2="450" y2="310"/>
    <polygon points="450,310 440,298 448,302"/>
    <line x1="260" y1="200" x2="420" y2="340"/>
    <polygon points="420,340 410,328 418,332"/>
    <line x1="300" y1="190" x2="480" y2="290"/>
    <polygon points="480,290 470,278 478,282"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="560" width="1200" height="240" fill="#8d6e63"/>
  <rect x="0" y="560" width="1200" height="15" fill="#a1887f"/>
  <!-- Soil layers -->
  <rect x="0" y="620" width="1200" height="180" fill="#795548"/>
  <rect x="0" y="700" width="1200" height="100" fill="#6d4c41"/>

  <!-- Grass -->
  <rect x="0" y="548" width="1200" height="20" fill="#66bb6a"/>
  <g fill="#4caf50">
    <ellipse cx="100" cy="555" rx="25" ry="6"/>
    <ellipse cx="300" cy="552" rx="30" ry="7"/>
    <ellipse cx="500" cy="555" rx="20" ry="5"/>
    <ellipse cx="900" cy="553" rx="28" ry="6"/>
    <ellipse cx="1100" cy="555" rx="22" ry="5"/>
  </g>

  <!-- Main plant/tree -->
  <!-- Stem -->
  <rect x="595" y="300" width="12" height="260" rx="3" fill="#66bb6a"/>
  <rect x="598" y="310" width="6" height="245" rx="2" fill="#81c784" opacity="0.5"/>

  <!-- Roots underground -->
  <g fill="none" stroke="#8d6e63" stroke-width="4">
    <path d="M601,560 Q580,600 550,650 Q530,680 510,720"/>
    <path d="M601,560 Q620,600 650,650 Q670,680 690,720"/>
    <path d="M601,560 Q590,590 570,620 Q560,640 540,660"/>
    <path d="M601,560 Q610,590 630,620 Q640,640 660,660"/>
    <path d="M601,560 L601,640"/>
  </g>
  <!-- Root hairs -->
  <g fill="none" stroke="#a1887f" stroke-width="1.5" opacity="0.6">
    <path d="M550,650 Q540,655 530,650"/><path d="M560,630 Q550,635 540,630"/>
    <path d="M650,650 Q660,655 670,650"/><path d="M640,630 Q650,635 660,630"/>
    <path d="M510,720 Q500,725 490,718"/><path d="M690,720 Q700,725 710,718"/>
  </g>

  <!-- Large leaf (main, showing cross-section feel) -->
  <path d="M607,320 Q700,260 780,300 Q820,320 780,360 Q700,400 607,360 Z" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <!-- Leaf veins -->
  <line x1="607" y1="340" x2="770" y2="330" stroke="#388e3c" stroke-width="1.5" opacity="0.5"/>
  <line x1="650" y1="340" x2="700" y2="305" stroke="#388e3c" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="340" x2="730" y2="310" stroke="#388e3c" stroke-width="1" opacity="0.4"/>
  <line x1="710" y1="342" x2="755" y2="320" stroke="#388e3c" stroke-width="1" opacity="0.4"/>
  <line x1="650" y1="345" x2="700" y2="370" stroke="#388e3c" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="348" x2="730" y2="365" stroke="#388e3c" stroke-width="1" opacity="0.4"/>

  <!-- Chloroplast detail (zoomed bubble) -->
  <circle cx="900" cy="300" r="70" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
  <!-- Line connecting to leaf -->
  <line x1="780" y1="330" x2="832" y2="310" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Chloroplast inside bubble -->
  <ellipse cx="900" cy="300" rx="45" ry="28" fill="#81c784" stroke="#4caf50" stroke-width="2"/>
  <!-- Thylakoid stacks (grana) -->
  <g fill="#388e3c" opacity="0.6">
    <rect x="870" y="286" width="20" height="4" rx="2"/><rect x="870" y="292" width="20" height="4" rx="2"/>
    <rect x="870" y="298" width="20" height="4" rx="2"/><rect x="870" y="304" width="20" height="4" rx="2"/>
    <rect x="905" y="288" width="18" height="4" rx="2"/><rect x="905" y="294" width="18" height="4" rx="2"/>
    <rect x="905" y="300" width="18" height="4" rx="2"/><rect x="905" y="306" width="18" height="4" rx="2"/>
  </g>
  <!-- Stroma -->
  <g fill="#a5d6a7" opacity="0.3">
    <circle cx="885" cy="315" r="3"/><circle cx="915" cy="285" r="3"/>
    <circle cx="895" cy="280" r="2"/><circle cx="910" cy="318" r="2.5"/>
  </g>

  <!-- Second leaf (left) -->
  <path d="M595,350 Q500,290 430,330 Q400,350 430,380 Q500,420 595,380 Z" fill="#66bb6a" stroke="#388e3c" stroke-width="2"/>
  <line x1="595" y1="365" x2="440" y2="355" stroke="#388e3c" stroke-width="1.5" opacity="0.5"/>

  <!-- CO2 molecules coming in (from right) -->
  <g font-size="12" font-family="sans-serif" font-weight="bold">
    <!-- CO2 molecule representations -->
    <g transform="translate(1000, 200)" opacity="0.7">
      <circle cx="0" cy="0" r="10" fill="#90a4ae" opacity="0.6"/>
      <circle cx="-14" cy="0" r="7" fill="#ef5350" opacity="0.6"/>
      <circle cx="14" cy="0" r="7" fill="#ef5350" opacity="0.6"/>
    </g>
    <g transform="translate(1060, 260)" opacity="0.6">
      <circle cx="0" cy="0" r="10" fill="#90a4ae" opacity="0.6"/>
      <circle cx="-14" cy="0" r="7" fill="#ef5350" opacity="0.6"/>
      <circle cx="14" cy="0" r="7" fill="#ef5350" opacity="0.6"/>
    </g>
    <g transform="translate(1020, 340)" opacity="0.5">
      <circle cx="0" cy="0" r="10" fill="#90a4ae" opacity="0.6"/>
      <circle cx="-14" cy="0" r="7" fill="#ef5350" opacity="0.6"/>
      <circle cx="14" cy="0" r="7" fill="#ef5350" opacity="0.6"/>
    </g>
  </g>
  <!-- CO2 arrows towards leaf -->
  <g stroke="#78909c" stroke-width="2" fill="#78909c" opacity="0.4">
    <line x1="985" y1="205" x2="820" y2="310"/>
    <polygon points="820,310 830,300 828,308"/>
    <line x1="1005" y1="340" x2="820" y2="350"/>
    <polygon points="820,350 832,344 830,352"/>
  </g>

  <!-- Water arrows coming up from roots -->
  <g stroke="#42a5f5" stroke-width="2.5" fill="#42a5f5" opacity="0.5">
    <line x1="580" y1="650" x2="597" y2="560"/>
    <polygon points="597,560 591,572 603,572"/>
    <line x1="620" y1="650" x2="605" y2="560"/>
    <polygon points="605,560 599,572 611,572"/>
  </g>
  <!-- Water droplets near roots -->
  <g fill="#64b5f6" opacity="0.5">
    <circle cx="545" cy="635" r="4"/><circle cx="560" cy="660" r="3"/>
    <circle cx="640" cy="640" r="4"/><circle cx="655" cy="665" r="3"/>
  </g>

  <!-- O2 molecules going out (left, upward) -->
  <g transform="translate(350, 250)" opacity="0.6">
    <circle cx="0" cy="0" r="8" fill="#42a5f5" opacity="0.5"/>
    <circle cx="12" cy="0" r="8" fill="#42a5f5" opacity="0.5"/>
  </g>
  <g transform="translate(310, 190)" opacity="0.5">
    <circle cx="0" cy="0" r="8" fill="#42a5f5" opacity="0.5"/>
    <circle cx="12" cy="0" r="8" fill="#42a5f5" opacity="0.5"/>
  </g>
  <g transform="translate(380, 180)" opacity="0.4">
    <circle cx="0" cy="0" r="8" fill="#42a5f5" opacity="0.5"/>
    <circle cx="12" cy="0" r="8" fill="#42a5f5" opacity="0.5"/>
  </g>
  <!-- O2 arrows going up -->
  <g stroke="#42a5f5" stroke-width="2" fill="#42a5f5" opacity="0.4">
    <line x1="430" y1="310" x2="360" y2="260"/>
    <polygon points="360,260 364,274 372,268"/>
    <line x1="420" y1="330" x2="320" y2="200"/>
    <polygon points="320,200 324,214 332,208"/>
  </g>

  <!-- Glucose molecule representation (inside plant, near stem) -->
  <g transform="translate(601, 450)" opacity="0.5">
    <circle cx="0" cy="0" r="12" fill="#ffcc80" stroke="#ff9800" stroke-width="1.5"/>
    <circle cx="-8" cy="-10" r="5" fill="#ef5350" opacity="0.6"/>
    <circle cx="8" cy="-10" r="5" fill="#ef5350" opacity="0.6"/>
    <circle cx="0" cy="12" r="5" fill="#ef5350" opacity="0.6"/>
  </g>
</svg>
