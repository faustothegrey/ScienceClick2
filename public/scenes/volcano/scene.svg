<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Sky -->
  <rect width="1200" height="800" fill="#87ceeb"/>
  <rect width="1200" height="800" fill="url(#skyGrad)"/>
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90c4"/>
      <stop offset="60%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#b0dce8"/>
    </linearGradient>
    <linearGradient id="lavaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <radialGradient id="magmaGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="60%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#cc1100"/>
    </radialGradient>
  </defs>

  <!-- Background mountains -->
  <polygon points="0,550 150,350 300,550" fill="#6b8e5a" opacity="0.4"/>
  <polygon points="900,550 1050,380 1200,550" fill="#6b8e5a" opacity="0.4"/>

  <!-- Ground -->
  <rect x="0" y="550" width="1200" height="250" fill="#8b7355"/>
  <rect x="0" y="550" width="1200" height="15" fill="#9b8365"/>

  <!-- Underground layers -->
  <rect x="0" y="620" width="1200" height="180" fill="#7a6245"/>
  <rect x="0" y="700" width="1200" height="100" fill="#6a5235"/>

  <!-- Magma Chamber (underground) -->
  <ellipse cx="600" cy="720" rx="180" ry="70" fill="url(#magmaGrad)"/>
  <ellipse cx="600" cy="715" rx="150" ry="50" fill="#ff5500" opacity="0.6"/>
  <ellipse cx="580" cy="710" rx="80" ry="30" fill="#ff8800" opacity="0.4"/>

  <!-- Volcano body -->
  <polygon points="300,550 600,150 900,550" fill="#8b6e4e"/>
  <polygon points="320,550 600,170 880,550" fill="#9b7e5e"/>
  <!-- Texture lines on volcano -->
  <line x1="450" y1="400" x2="480" y2="550" stroke="#7a5e3e" stroke-width="1.5" opacity="0.4"/>
  <line x1="600" y1="200" x2="600" y2="300" stroke="#7a5e3e" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="350" x2="720" y2="550" stroke="#7a5e3e" stroke-width="1.5" opacity="0.4"/>
  <line x1="520" y1="300" x2="500" y2="450" stroke="#7a5e3e" stroke-width="1" opacity="0.3"/>
  <line x1="680" y1="280" x2="710" y2="450" stroke="#7a5e3e" stroke-width="1" opacity="0.3"/>

  <!-- Conduit (vertical channel inside volcano) -->
  <polygon points="575,720 580,180 620,180 625,720" fill="#cc2200" opacity="0.7"/>
  <polygon points="582,700 586,200 614,200 618,700" fill="#ff4400" opacity="0.5"/>

  <!-- Crater (top of volcano) -->
  <ellipse cx="600" cy="155" rx="50" ry="15" fill="#6a4e2e"/>
  <ellipse cx="600" cy="155" rx="40" ry="10" fill="#ff3300" opacity="0.6"/>
  <ellipse cx="600" cy="155" rx="30" ry="7" fill="#ff6600" opacity="0.5"/>

  <!-- Lava flow (right side) -->
  <path d="M620,165 Q680,250 750,350 Q790,420 830,500 Q845,530 860,555" fill="none" stroke="#ff4400" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <path d="M620,165 Q680,250 750,350 Q790,420 830,500 Q845,530 860,555" fill="none" stroke="#ff8800" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M620,165 Q680,250 750,350 Q790,420 830,500 Q845,530 860,555" fill="none" stroke="#ffaa00" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Lava flow (left side, smaller) -->
  <path d="M580,165 Q540,280 490,380 Q470,430 450,480 Q440,510 430,545" fill="none" stroke="#ff4400" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
  <path d="M580,165 Q540,280 490,380 Q470,430 450,480 Q440,510 430,545" fill="none" stroke="#ff8800" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

  <!-- Side vent (left side of volcano) -->
  <ellipse cx="430" cy="420" rx="20" ry="10" fill="#6a4e2e"/>
  <ellipse cx="430" cy="418" rx="14" ry="6" fill="#ff4400" opacity="0.7"/>
  <!-- Small lava from side vent -->
  <path d="M420,420 Q390,460 370,510 Q360,535 355,555" fill="none" stroke="#ff4400" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <path d="M420,420 Q390,460 370,510 Q360,535 355,555" fill="none" stroke="#ff8800" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Side conduit -->
  <line x1="590" y1="500" x2="430" y2="420" stroke="#cc2200" stroke-width="10" opacity="0.5"/>
  <line x1="590" y1="500" x2="430" y2="420" stroke="#ff4400" stroke-width="5" opacity="0.4"/>

  <!-- Ash cloud / eruption plume -->
  <g opacity="0.85">
    <ellipse cx="600" cy="80" rx="90" ry="50" fill="#696969"/>
    <ellipse cx="560" cy="70" rx="70" ry="45" fill="#808080"/>
    <ellipse cx="640" cy="65" rx="75" ry="40" fill="#787878"/>
    <ellipse cx="600" cy="50" rx="60" ry="35" fill="#909090"/>
    <ellipse cx="570" cy="100" rx="50" ry="30" fill="#606060"/>
    <ellipse cx="640" cy="95" rx="55" ry="28" fill="#707070"/>
    <ellipse cx="600" cy="110" rx="40" ry="20" fill="#585858"/>
    <!-- Column from crater to cloud -->
    <rect x="580" y="110" width="40" height="50" fill="#707070" opacity="0.7"/>
    <rect x="585" y="120" width="30" height="40" fill="#808080" opacity="0.5"/>
  </g>

  <!-- Ash particles -->
  <g fill="#505050" opacity="0.4">
    <circle cx="500" cy="120" r="3"/><circle cx="700" cy="100" r="2.5"/>
    <circle cx="480" cy="150" r="2"/><circle cx="720" cy="140" r="2.5"/>
    <circle cx="510" cy="180" r="1.5"/><circle cx="690" cy="170" r="2"/>
    <circle cx="460" cy="200" r="2"/><circle cx="740" cy="190" r="1.5"/>
  </g>

  <!-- Trees at base -->
  <g>
    <rect x="180" y="510" width="8" height="40" fill="#5a4020"/>
    <ellipse cx="184" cy="505" rx="18" ry="22" fill="#4a8b3a"/>
    <rect x="250" y="520" width="6" height="30" fill="#5a4020"/>
    <ellipse cx="253" cy="515" rx="14" ry="18" fill="#3a7b2a"/>
    <rect x="950" y="515" width="8" height="35" fill="#5a4020"/>
    <ellipse cx="954" cy="510" rx="16" ry="20" fill="#4a8b3a"/>
    <rect x="1020" y="520" width="6" height="30" fill="#5a4020"/>
    <ellipse cx="1023" cy="515" rx="14" ry="18" fill="#3a7b2a"/>
  </g>

  <!-- Cross-section label line (dashed, showing underground) -->
  <line x1="0" y1="555" x2="300" y2="555" stroke="#ffffff" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <line x1="900" y1="555" x2="1200" y2="555" stroke="#ffffff" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
</svg>
