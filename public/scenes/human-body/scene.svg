<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f5f0eb"/>

  <!-- Body silhouette (front view, centered) -->
  <defs>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="100%" stop-color="#e8cfa0"/>
    </linearGradient>
  </defs>

  <!-- Head -->
  <ellipse cx="600" cy="95" rx="50" ry="60" fill="url(#skinGrad)" stroke="#c9a96e" stroke-width="2"/>
  <!-- Face features -->
  <ellipse cx="582" cy="85" rx="6" ry="4" fill="#8b7355"/>
  <ellipse cx="618" cy="85" rx="6" ry="4" fill="#8b7355"/>
  <path d="M590,105 Q600,112 610,105" fill="none" stroke="#8b7355" stroke-width="1.5"/>
  <!-- Hair -->
  <path d="M550,75 Q555,35 600,30 Q645,35 650,75" fill="#5a3a1a" stroke="none"/>

  <!-- Neck -->
  <rect x="585" y="150" width="30" height="30" fill="url(#skinGrad)" stroke="none"/>

  <!-- Torso outline -->
  <path d="M530,180 Q520,180 500,200 L480,320 Q475,380 490,440 L510,500 Q530,520 540,520
           L560,520 L570,560 L560,650 L555,720 L570,730 L590,730 L600,650
           L610,730 L630,730 L645,720 L640,650 L630,560 L640,520 L660,520
           Q670,520 690,500 L710,440 Q725,380 720,320 L700,200 Q680,180 670,180 Z"
        fill="url(#skinGrad)" stroke="#c9a96e" stroke-width="2"/>

  <!-- Arms -->
  <!-- Left arm -->
  <path d="M530,185 Q490,190 460,230 L420,330 Q410,360 405,390 L395,430 Q392,445 400,450 L415,445 Q420,440 425,420 L445,350 Q460,310 475,280"
        fill="url(#skinGrad)" stroke="#c9a96e" stroke-width="2"/>
  <!-- Right arm -->
  <path d="M670,185 Q710,190 740,230 L780,330 Q790,360 795,390 L805,430 Q808,445 800,450 L785,445 Q780,440 775,420 L755,350 Q740,310 725,280"
        fill="url(#skinGrad)" stroke="#c9a96e" stroke-width="2"/>

  <!-- === INTERNAL ORGANS === -->

  <!-- Brain (visible in head, transparent overlay) -->
  <ellipse cx="600" cy="78" rx="35" ry="30" fill="#ffb3ba" opacity="0.7" stroke="#e88090" stroke-width="1.5"/>
  <!-- Brain folds -->
  <path d="M575,70 Q585,60 600,65 Q615,60 625,70" fill="none" stroke="#e88090" stroke-width="1.5" opacity="0.6"/>
  <path d="M578,82 Q590,75 600,78 Q610,75 622,82" fill="none" stroke="#e88090" stroke-width="1.5" opacity="0.6"/>
  <line x1="600" y1="50" x2="600" y2="95" stroke="#e88090" stroke-width="1" opacity="0.4"/>

  <!-- Skin indicator (outer layer highlight on arm) -->
  <path d="M455,240 Q440,260 430,290" fill="none" stroke="#deb887" stroke-width="6" opacity="0.7"/>
  <path d="M455,240 Q440,260 430,290" fill="none" stroke="#f5deb3" stroke-width="3" opacity="0.8"/>
  <!-- Skin cross-section detail -->
  <rect x="350" cy="260" y="250" width="50" height="30" rx="4" fill="#f5deb3" stroke="#c9a96e" stroke-width="1.5" opacity="0.8"/>
  <line x1="350" y1="260" x2="400" y2="260" stroke="#deb887" stroke-width="1" opacity="0.6"/>
  <line x1="350" y1="270" x2="400" y2="270" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>

  <!-- Lungs -->
  <!-- Left lung -->
  <path d="M540,220 Q520,230 515,260 Q510,300 515,340 Q520,370 540,380 Q555,385 565,370 Q570,350 570,300 Q570,250 555,225 Z"
        fill="#ffcdd2" stroke="#e57373" stroke-width="2" opacity="0.8"/>
  <!-- Right lung -->
  <path d="M660,220 Q680,230 685,260 Q690,300 685,340 Q680,370 660,380 Q645,385 635,370 Q630,350 630,300 Q630,250 645,225 Z"
        fill="#ffcdd2" stroke="#e57373" stroke-width="2" opacity="0.8"/>
  <!-- Lung detail lines -->
  <path d="M530,260 Q545,270 555,260" fill="none" stroke="#e57373" stroke-width="1" opacity="0.4"/>
  <path d="M525,300 Q540,310 555,300" fill="none" stroke="#e57373" stroke-width="1" opacity="0.4"/>
  <path d="M645,260 Q660,270 670,260" fill="none" stroke="#e57373" stroke-width="1" opacity="0.4"/>
  <path d="M645,300 Q660,310 675,300" fill="none" stroke="#e57373" stroke-width="1" opacity="0.4"/>

  <!-- Heart (between lungs) -->
  <path d="M585,270 Q575,255 585,245 Q595,235 600,250 Q605,235 615,245 Q625,255 615,270 L600,295 Z"
        fill="#ef5350" stroke="#c62828" stroke-width="2" opacity="0.9"/>
  <!-- Heart glow -->
  <path d="M590,260 Q595,252 600,258 Q605,252 610,260 L600,278 Z"
        fill="#ff8a80" stroke="none" opacity="0.5"/>

  <!-- Stomach -->
  <path d="M570,390 Q555,395 545,420 Q540,445 550,465 Q565,480 590,478 Q610,475 620,455 Q630,430 620,405 Q610,390 595,388 Z"
        fill="#fff9c4" stroke="#f9a825" stroke-width="2" opacity="0.8"/>
  <!-- Stomach inner curve -->
  <path d="M565,410 Q555,430 560,455 Q570,468 585,465" fill="none" stroke="#f9a825" stroke-width="1.5" opacity="0.4"/>

  <!-- Skeleton overlay (ribcage + spine hint) -->
  <g stroke="#b0bec5" stroke-width="1.5" fill="none" opacity="0.35">
    <!-- Spine -->
    <line x1="600" y1="180" x2="600" y2="500"/>
    <!-- Ribs -->
    <path d="M600,210 Q560,220 540,240"/>
    <path d="M600,210 Q640,220 660,240"/>
    <path d="M600,240 Q555,250 535,270"/>
    <path d="M600,240 Q645,250 665,270"/>
    <path d="M600,270 Q555,280 535,300"/>
    <path d="M600,270 Q645,280 665,300"/>
    <path d="M600,300 Q560,310 545,325"/>
    <path d="M600,300 Q640,310 655,325"/>
    <path d="M600,330 Q565,338 555,348"/>
    <path d="M600,330 Q635,338 645,348"/>
    <!-- Pelvis -->
    <path d="M600,490 Q560,500 530,510 Q520,515 525,525"/>
    <path d="M600,490 Q640,500 670,510 Q680,515 675,525"/>
    <!-- Shoulder joints -->
    <circle cx="530" cy="190" r="8" stroke-width="1.5"/>
    <circle cx="670" cy="190" r="8" stroke-width="1.5"/>
    <!-- Femur hints -->
    <line x1="555" y1="525" x2="560" y2="650"/>
    <line x1="645" y1="525" x2="640" y2="650"/>
  </g>

  <!-- Muscle fibers (on right arm, visible) -->
  <g opacity="0.5">
    <path d="M700,210 Q720,230 730,270 Q735,300 725,310" fill="#ef9a9a" stroke="#e57373" stroke-width="2"/>
    <path d="M695,215 Q710,235 718,265" fill="none" stroke="#e57373" stroke-width="1.5" opacity="0.5"/>
    <path d="M710,225 Q725,245 730,275" fill="none" stroke="#e57373" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Intestines hint below stomach -->
  <g fill="none" stroke="#ffb74d" stroke-width="3" opacity="0.35">
    <path d="M560,485 Q575,490 585,485 Q595,480 605,485 Q615,490 625,485 Q635,480 640,490"/>
    <path d="M555,500 Q570,505 580,500 Q590,495 600,500 Q610,505 620,500 Q630,495 640,505"/>
  </g>
</svg>
