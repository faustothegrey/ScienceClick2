<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Layer gradients -->
    <linearGradient id="exoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#141450"/>
    </linearGradient>
    <linearGradient id="thermoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141450"/>
      <stop offset="100%" stop-color="#1e2870"/>
    </linearGradient>
    <linearGradient id="mesoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2870"/>
      <stop offset="100%" stop-color="#2e4890"/>
    </linearGradient>
    <linearGradient id="stratoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e4890"/>
      <stop offset="100%" stop-color="#5088c0"/>
    </linearGradient>
    <linearGradient id="tropoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5088c0"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
  </defs>

  <!-- Exosphere (top) -->
  <rect x="0" y="0" width="1200" height="130" fill="url(#exoGrad)"/>

  <!-- Stars in exosphere -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="100" cy="30" r="1.5"/><circle cx="250" cy="50" r="1"/><circle cx="400" cy="20" r="1.5"/>
    <circle cx="550" cy="45" r="1"/><circle cx="700" cy="15" r="1.5"/><circle cx="850" cy="55" r="1"/>
    <circle cx="1000" cy="25" r="1.5"/><circle cx="1100" cy="60" r="1"/><circle cx="150" cy="80" r="1"/>
    <circle cx="500" cy="75" r="1.5"/><circle cx="800" cy="90" r="1"/><circle cx="1050" cy="100" r="1.5"/>
    <circle cx="300" cy="100" r="1"/><circle cx="650" cy="110" r="1"/>
  </g>

  <!-- Satellite in exosphere -->
  <g transform="translate(900, 60)">
    <rect x="-20" y="-3" width="40" height="6" rx="1" fill="#c0c0c0"/>
    <rect x="-5" y="-8" width="10" height="16" rx="2" fill="#e0e0e0" stroke="#a0a0a0" stroke-width="1"/>
    <rect x="-25" y="-1" width="6" height="2" fill="#4488cc"/>
    <rect x="19" y="-1" width="6" height="2" fill="#4488cc"/>
  </g>

  <!-- Thermosphere -->
  <rect x="0" y="130" width="1200" height="140" fill="url(#thermoGrad)"/>

  <!-- Aurora effect in thermosphere -->
  <g opacity="0.3">
    <path d="M200,140 Q300,160 400,145 Q500,155 600,140 Q700,160 800,145" fill="none" stroke="#40ff80" stroke-width="3"/>
    <path d="M150,155 Q250,175 350,160 Q450,170 550,155 Q650,175 750,160 Q850,170 950,155" fill="none" stroke="#60ffa0" stroke-width="2"/>
    <path d="M250,170 Q350,185 450,172 Q550,182 650,168" fill="none" stroke="#80ffc0" stroke-width="1.5"/>
  </g>

  <!-- Meteor in thermosphere -->
  <g transform="translate(350, 200)">
    <circle cx="0" cy="0" r="3" fill="#ffcc00"/>
    <path d="M3,-2 L30,-18" stroke="#ffcc00" stroke-width="2" opacity="0.7"/>
    <path d="M3,-2 L25,-15" stroke="#ffee88" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Mesosphere -->
  <rect x="0" y="270" width="1200" height="130" fill="url(#mesoGrad)"/>

  <!-- Layer boundary line -->
  <line x1="0" y1="270" x2="1200" y2="270" stroke="#ffffff" stroke-width="0.5" opacity="0.2" stroke-dasharray="8,6"/>

  <!-- Stratosphere -->
  <rect x="0" y="400" width="1200" height="160" fill="url(#stratoGrad)"/>

  <!-- Layer boundary line -->
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#ffffff" stroke-width="0.5" opacity="0.2" stroke-dasharray="8,6"/>

  <!-- Ozone layer (band within stratosphere) -->
  <rect x="0" y="420" width="1200" height="50" fill="#90caf9" opacity="0.25"/>
  <rect x="0" y="430" width="1200" height="30" fill="#64b5f6" opacity="0.2"/>
  <!-- O3 molecules scattered -->
  <g opacity="0.3">
    <g transform="translate(200, 445)">
      <circle cx="0" cy="0" r="4" fill="#42a5f5"/><circle cx="8" cy="-4" r="4" fill="#42a5f5"/><circle cx="8" cy="4" r="4" fill="#42a5f5"/>
    </g>
    <g transform="translate(500, 440)">
      <circle cx="0" cy="0" r="4" fill="#42a5f5"/><circle cx="8" cy="-4" r="4" fill="#42a5f5"/><circle cx="8" cy="4" r="4" fill="#42a5f5"/>
    </g>
    <g transform="translate(800, 448)">
      <circle cx="0" cy="0" r="4" fill="#42a5f5"/><circle cx="8" cy="-4" r="4" fill="#42a5f5"/><circle cx="8" cy="4" r="4" fill="#42a5f5"/>
    </g>
    <g transform="translate(1050, 442)">
      <circle cx="0" cy="0" r="4" fill="#42a5f5"/><circle cx="8" cy="-4" r="4" fill="#42a5f5"/><circle cx="8" cy="4" r="4" fill="#42a5f5"/>
    </g>
  </g>

  <!-- High-altitude balloon in stratosphere -->
  <g transform="translate(1000, 480)">
    <circle cx="0" cy="-15" r="12" fill="#ffffff" opacity="0.6" stroke="#ccc" stroke-width="1"/>
    <line x1="0" y1="-3" x2="0" y2="10" stroke="#999" stroke-width="0.8"/>
    <rect x="-4" y="10" width="8" height="5" rx="1" fill="#e0e0e0"/>
  </g>

  <!-- Airplane in stratosphere (high cruising) -->
  <g transform="translate(700, 510)">
    <path d="M-20,0 L20,0 L25,-2 L20,0 L-15,5 L-20,0 Z" fill="#d0d0d0" stroke="#a0a0a0" stroke-width="1"/>
    <path d="M-5,-8 L5,-2 L-5,0 Z" fill="#d0d0d0"/>
    <path d="M-18,2 L-15,6 L-20,4 Z" fill="#d0d0d0"/>
  </g>

  <!-- Troposphere -->
  <rect x="0" y="560" width="1200" height="140" fill="url(#tropoGrad)"/>

  <!-- Layer boundary line -->
  <line x1="0" y1="560" x2="1200" y2="560" stroke="#ffffff" stroke-width="0.5" opacity="0.2" stroke-dasharray="8,6"/>

  <!-- Clouds in troposphere -->
  <g fill="#ffffff" opacity="0.8">
    <ellipse cx="200" cy="600" rx="50" ry="22"/><ellipse cx="240" cy="593" rx="40" ry="20"/>
    <ellipse cx="170" cy="597" rx="35" ry="18"/>
    <ellipse cx="600" cy="620" rx="55" ry="25"/><ellipse cx="645" cy="612" rx="45" ry="22"/>
    <ellipse cx="565" cy="615" rx="40" ry="20"/>
    <ellipse cx="950" cy="590" rx="45" ry="20"/><ellipse cx="985" cy="584" rx="38" ry="18"/>
    <ellipse cx="920" cy="587" rx="32" ry="16"/>
  </g>

  <!-- Rain from a cloud -->
  <g stroke="#6ab7ff" stroke-width="1.5" opacity="0.4">
    <line x1="180" y1="620" x2="175" y2="645"/><line x1="200" y1="622" x2="195" y2="650"/>
    <line x1="220" y1="618" x2="215" y2="648"/><line x1="240" y1="615" x2="235" y2="640"/>
  </g>

  <!-- Bird in troposphere -->
  <g transform="translate(450, 585)" fill="none" stroke="#333" stroke-width="1.5">
    <path d="M-8,0 Q-4,-6 0,0 Q4,-6 8,0"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="700" width="1200" height="100" fill="#6b8e5a"/>
  <rect x="0" y="700" width="1200" height="8" fill="#5a7d4a"/>

  <!-- Mountains on ground -->
  <polygon points="100,700 200,650 300,700" fill="#7a9e6a"/>
  <polygon points="250,700 380,630 500,700" fill="#6b8e5a"/>
  <polygon points="800,700 920,640 1050,700" fill="#7a9e6a"/>
  <polygon points="950,700 1080,660 1200,700" fill="#6b8e5a"/>

  <!-- Trees -->
  <rect x="550" y="680" width="6" height="20" fill="#5a4020"/>
  <ellipse cx="553" cy="675" rx="12" ry="15" fill="#4a8b3a"/>
  <rect x="650" y="682" width="5" height="18" fill="#5a4020"/>
  <ellipse cx="652" cy="678" rx="10" ry="12" fill="#3a7b2a"/>

  <!-- City silhouette -->
  <g fill="#4a5568" opacity="0.4">
    <rect x="380" y="678" width="15" height="22"/>
    <rect x="398" y="670" width="12" height="30"/>
    <rect x="413" y="675" width="18" height="25"/>
    <rect x="434" y="682" width="10" height="18"/>
  </g>

  <!-- Altitude labels (right side, subtle) -->
  <g fill="#ffffff" font-size="11" opacity="0.25" font-family="sans-serif">
    <text x="1160" y="70" text-anchor="end">500+ km</text>
    <text x="1160" y="200" text-anchor="end">80-500 km</text>
    <text x="1160" y="340" text-anchor="end">50-80 km</text>
    <text x="1160" y="480" text-anchor="end">12-50 km</text>
    <text x="1160" y="640" text-anchor="end">0-12 km</text>
  </g>
</svg>
