<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f8fafc" rx="12" />

  <!-- Central object: a generic cube/block representing "materia" -->
  <g transform="translate(500, 280)">
    <!-- 3D cube -->
    <polygon points="100,0 200,50 200,170 100,220 0,170 0,50" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" />
    <polygon points="100,0 200,50 100,100 0,50" fill="#c7d2fe" stroke="#6366f1" stroke-width="2" />
    <polygon points="200,50 200,170 100,220 100,100" fill="#a5b4fc" stroke="#6366f1" stroke-width="2" />
    <polygon points="0,50 100,100 100,220 0,170" fill="#818cf8" stroke="#6366f1" stroke-width="2" />
    <!-- Question mark on the cube -->
    <text x="100" y="130" text-anchor="middle" font-size="48" font-weight="bold" fill="#4f46e5" font-family="sans-serif">?</text>
  </g>

  <!-- ==================== PROPERTY ICONS ==================== -->

  <!-- 1. COLORE (Color) — top-left: color palette -->
  <g transform="translate(60, 60)">
    <circle cx="40" cy="40" r="38" fill="#fef2f2" stroke="#ef4444" stroke-width="2" />
    <circle cx="28" cy="30" r="10" fill="#ef4444" />
    <circle cx="50" cy="28" r="10" fill="#3b82f6" />
    <circle cx="38" cy="50" r="10" fill="#eab308" />
    <circle cx="55" cy="48" r="10" fill="#22c55e" />
  </g>

  <!-- 2. PESO (Weight) — top-center-left: scale/balance -->
  <g transform="translate(260, 60)">
    <circle cx="40" cy="40" r="38" fill="#fefce8" stroke="#eab308" stroke-width="2" />
    <!-- Balance -->
    <line x1="40" y1="20" x2="40" y2="55" stroke="#a16207" stroke-width="3" />
    <line x1="18" y1="35" x2="62" y2="35" stroke="#a16207" stroke-width="2.5" />
    <rect x="32" y="55" width="16" height="6" rx="2" fill="#a16207" />
    <!-- Pans -->
    <path d="M14,35 Q14,48 24,48 L12,48 Q2,48 8,35Z" fill="#ca8a04" />
    <path d="M56,35 Q56,48 66,48 L54,48 Q44,48 50,35Z" fill="#ca8a04" />
    <!-- Weight on left pan -->
    <rect x="10" y="40" width="12" height="8" rx="2" fill="#854d0e" />
  </g>

  <!-- 3. DENSITA (Density) — top-center-right: packed vs sparse dots -->
  <g transform="translate(860, 60)">
    <circle cx="40" cy="40" r="38" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" />
    <!-- Dense side -->
    <circle cx="22" cy="28" r="4" fill="#16a34a" />
    <circle cx="32" cy="28" r="4" fill="#16a34a" />
    <circle cx="22" cy="38" r="4" fill="#16a34a" />
    <circle cx="32" cy="38" r="4" fill="#16a34a" />
    <circle cx="22" cy="48" r="4" fill="#16a34a" />
    <circle cx="32" cy="48" r="4" fill="#16a34a" />
    <!-- Divider -->
    <line x1="40" y1="20" x2="40" y2="60" stroke="#86efac" stroke-width="1.5" stroke-dasharray="3,2" />
    <!-- Sparse side -->
    <circle cx="50" cy="30" r="4" fill="#86efac" />
    <circle cx="60" cy="45" r="4" fill="#86efac" />
    <circle cx="52" cy="52" r="4" fill="#86efac" />
  </g>

  <!-- 4. DUREZZA (Hardness) — top-right: diamond shape -->
  <g transform="translate(1060, 60)">
    <circle cx="40" cy="40" r="38" fill="#faf5ff" stroke="#a855f7" stroke-width="2" />
    <polygon points="40,15 58,40 40,65 22,40" fill="#d8b4fe" stroke="#9333ea" stroke-width="2" />
    <line x1="40" y1="15" x2="40" y2="65" stroke="#9333ea" stroke-width="1" opacity="0.5" />
    <line x1="22" y1="40" x2="58" y2="40" stroke="#9333ea" stroke-width="1" opacity="0.5" />
  </g>

  <!-- 5. ELASTICITA (Elasticity) — bottom-left: spring -->
  <g transform="translate(60, 660)">
    <circle cx="40" cy="40" r="38" fill="#fff7ed" stroke="#f97316" stroke-width="2" />
    <path d="M15,25 Q25,15 35,25 Q45,35 55,25 Q65,15 70,25" fill="none" stroke="#ea580c" stroke-width="2.5" />
    <path d="M15,40 Q25,30 35,40 Q45,50 55,40 Q65,30 70,40" fill="none" stroke="#ea580c" stroke-width="2.5" />
    <path d="M15,55 Q25,45 35,55 Q45,65 55,55 Q65,45 70,55" fill="none" stroke="#ea580c" stroke-width="2.5" />
    <!-- Arrows showing stretch -->
    <line x1="12" y1="40" x2="5" y2="40" stroke="#c2410c" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="72" y1="40" x2="78" y2="40" stroke="#c2410c" stroke-width="2" marker-end="url(#arrow)" />
  </g>

  <!-- 6. CONDUTTIVITA TERMICA (Thermal conductivity) — bottom-center-left: thermometer + arrow -->
  <g transform="translate(260, 660)">
    <circle cx="40" cy="40" r="38" fill="#fef2f2" stroke="#ef4444" stroke-width="2" />
    <!-- Thermometer -->
    <rect x="35" y="18" width="10" height="35" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" />
    <circle cx="40" cy="56" r="8" fill="#dc2626" />
    <!-- Mercury level -->
    <rect x="37" y="28" width="6" height="25" rx="2" fill="#dc2626" />
    <!-- Heat waves -->
    <path d="M55,25 Q60,30 55,35" fill="none" stroke="#f87171" stroke-width="1.5" />
    <path d="M60,22 Q67,30 60,38" fill="none" stroke="#f87171" stroke-width="1.5" />
  </g>

  <!-- 7. CONDUTTIVITA ELETTRICA (Electrical conductivity) — bottom-center-right: lightning bolt -->
  <g transform="translate(860, 660)">
    <circle cx="40" cy="40" r="38" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
    <polygon points="45,15 30,42 40,42 35,65 55,35 44,35" fill="#facc15" stroke="#eab308" stroke-width="1.5" />
  </g>

  <!-- 8. DILATAZIONE TERMICA (Thermal expansion) — bottom-right: expanding arrows from center -->
  <g transform="translate(1060, 660)">
    <circle cx="40" cy="40" r="38" fill="#ecfdf5" stroke="#14b8a6" stroke-width="2" />
    <!-- Central dot -->
    <circle cx="40" cy="40" r="6" fill="#14b8a6" />
    <!-- Expanding arrows -->
    <line x1="40" y1="30" x2="40" y2="18" stroke="#0d9488" stroke-width="2" />
    <polygon points="36,19 40,12 44,19" fill="#0d9488" />
    <line x1="40" y1="50" x2="40" y2="62" stroke="#0d9488" stroke-width="2" />
    <polygon points="36,61 40,68 44,61" fill="#0d9488" />
    <line x1="30" y1="40" x2="18" y2="40" stroke="#0d9488" stroke-width="2" />
    <polygon points="19,36 12,40 19,44" fill="#0d9488" />
    <line x1="50" y1="40" x2="62" y2="40" stroke="#0d9488" stroke-width="2" />
    <polygon points="61,36 68,40 61,44" fill="#0d9488" />
  </g>

  <!-- ==================== CONNECTING LINES from icons to cube ==================== -->
  <!-- Dashed lines from each icon circle to the central cube -->
  <line x1="138" y1="100" x2="500" y2="330" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
  <line x1="338" y1="100" x2="530" y2="310" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
  <line x1="898" y1="100" x2="670" y2="310" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
  <line x1="1098" y1="100" x2="700" y2="330" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
  <line x1="138" y1="700" x2="500" y2="470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
  <line x1="338" y1="700" x2="530" y2="490" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
  <line x1="898" y1="700" x2="670" y2="490" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
  <line x1="1098" y1="700" x2="700" y2="470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
</svg>