<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="oxygenGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fca5a5" />
      <stop offset="100%" stop-color="#dc2626" />
    </radialGradient>
    <radialGradient id="hydrogenGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#e0e7ff" />
      <stop offset="100%" stop-color="#818cf8" />
    </radialGradient>
    <radialGradient id="carbonGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#6b7280" />
      <stop offset="100%" stop-color="#1f2937" />
    </radialGradient>
    <radialGradient id="sodiumGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </radialGradient>
    <radialGradient id="chlorineGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#86efac" />
      <stop offset="100%" stop-color="#16a34a" />
    </radialGradient>
    <radialGradient id="nitrogenGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="100%" stop-color="#2563eb" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f8fafc" rx="12" />

  <!-- ==================== MOLECULE 1: H₂O (Water) — top-left ==================== -->
  <g transform="translate(80, 60)">
    <!-- Card background -->
    <rect width="460" height="300" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" />

    <!-- Water molecule: bent shape -->
    <!-- Oxygen (center, large) -->
    <circle cx="230" cy="130" r="40" fill="url(#oxygenGrad)" />
    <text x="230" y="138" text-anchor="middle" font-size="24" font-weight="bold" fill="white" font-family="sans-serif">O</text>

    <!-- Bond lines -->
    <line x1="195" y1="150" x2="145" y2="195" stroke="#94a3b8" stroke-width="4" />
    <line x1="265" y1="150" x2="315" y2="195" stroke="#94a3b8" stroke-width="4" />

    <!-- Hydrogen 1 (left) -->
    <circle cx="130" cy="210" r="28" fill="url(#hydrogenGrad)" />
    <text x="130" y="218" text-anchor="middle" font-size="20" font-weight="bold" fill="white" font-family="sans-serif">H</text>

    <!-- Hydrogen 2 (right) -->
    <circle cx="330" cy="210" r="28" fill="url(#hydrogenGrad)" />
    <text x="330" y="218" text-anchor="middle" font-size="20" font-weight="bold" fill="white" font-family="sans-serif">H</text>
  </g>

  <!-- ==================== MOLECULE 2: O₂ (Oxygen) — top-right ==================== -->
  <g transform="translate(660, 60)">
    <rect width="460" height="300" rx="16" fill="#fef2f2" stroke="#fecaca" stroke-width="2" />

    <!-- Double bond -->
    <line x1="175" y1="148" x2="285" y2="148" stroke="#94a3b8" stroke-width="4" />
    <line x1="175" y1="162" x2="285" y2="162" stroke="#94a3b8" stroke-width="4" />

    <!-- Oxygen 1 -->
    <circle cx="160" cy="155" r="40" fill="url(#oxygenGrad)" />
    <text x="160" y="163" text-anchor="middle" font-size="24" font-weight="bold" fill="white" font-family="sans-serif">O</text>

    <!-- Oxygen 2 -->
    <circle cx="300" cy="155" r="40" fill="url(#oxygenGrad)" />
    <text x="300" y="163" text-anchor="middle" font-size="24" font-weight="bold" fill="white" font-family="sans-serif">O</text>
  </g>

  <!-- ==================== MOLECULE 3: CH₄ (Methane) — bottom-left ==================== -->
  <g transform="translate(80, 440)">
    <rect width="460" height="300" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2" />

    <!-- Carbon (center) -->
    <circle cx="230" cy="150" r="38" fill="url(#carbonGrad)" />
    <text x="230" y="158" text-anchor="middle" font-size="24" font-weight="bold" fill="white" font-family="sans-serif">C</text>

    <!-- Bonds -->
    <line x1="230" y1="112" x2="230" y2="65" stroke="#94a3b8" stroke-width="4" />
    <line x1="230" y1="188" x2="230" y2="235" stroke="#94a3b8" stroke-width="4" />
    <line x1="192" y1="150" x2="140" y2="150" stroke="#94a3b8" stroke-width="4" />
    <line x1="268" y1="150" x2="320" y2="150" stroke="#94a3b8" stroke-width="4" />

    <!-- Hydrogen atoms -->
    <circle cx="230" cy="50" r="25" fill="url(#hydrogenGrad)" />
    <text x="230" y="57" text-anchor="middle" font-size="18" font-weight="bold" fill="white" font-family="sans-serif">H</text>

    <circle cx="230" cy="250" r="25" fill="url(#hydrogenGrad)" />
    <text x="230" y="257" text-anchor="middle" font-size="18" font-weight="bold" fill="white" font-family="sans-serif">H</text>

    <circle cx="125" cy="150" r="25" fill="url(#hydrogenGrad)" />
    <text x="125" y="157" text-anchor="middle" font-size="18" font-weight="bold" fill="white" font-family="sans-serif">H</text>

    <circle cx="335" cy="150" r="25" fill="url(#hydrogenGrad)" />
    <text x="335" y="157" text-anchor="middle" font-size="18" font-weight="bold" fill="white" font-family="sans-serif">H</text>
  </g>

  <!-- ==================== MOLECULE 4: NaCl (Salt) — bottom-center ==================== -->
  <g transform="translate(660, 440)">
    <rect width="460" height="300" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="2" />

    <!-- Ionic bond (dashed) -->
    <line x1="195" y1="155" x2="265" y2="155" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8,4" />

    <!-- Sodium -->
    <circle cx="170" cy="155" r="40" fill="url(#sodiumGrad)" />
    <text x="170" y="163" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="sans-serif">Na</text>

    <!-- Chlorine -->
    <circle cx="290" cy="155" r="40" fill="url(#chlorineGrad)" />
    <text x="290" y="163" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="sans-serif">Cl</text>

    <!-- + and - signs -->
    <text x="170" y="112" text-anchor="middle" font-size="20" font-weight="bold" fill="#7c3aed" font-family="sans-serif">+</text>
    <text x="290" y="112" text-anchor="middle" font-size="22" font-weight="bold" fill="#16a34a" font-family="sans-serif">-</text>
  </g>
</svg>