<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" fill="none">
  <!-- Sky -->
  <rect width="700" height="450" fill="#e0f2fe"/>

  <!-- Mountains -->
  <polygon points="50,350 200,150 350,350" fill="#6b7280"/>
  <polygon points="250,350 400,120 550,350" fill="#9ca3af"/>
  <polygon points="450,350 580,180 700,350" fill="#6b7280"/>

  <!-- Snow caps -->
  <polygon points="170,180 200,150 230,180" fill="white"/>
  <polygon points="370,150 400,120 430,150" fill="white"/>
  <polygon points="555,205 580,180 605,205" fill="white"/>

  <!-- Ground -->
  <rect y="350" width="700" height="100" fill="#86efac"/>

  <!-- Water body -->
  <ellipse cx="150" cy="380" rx="120" ry="30" fill="#3b82f6" opacity="0.7"/>

  <!-- Sun -->
  <circle cx="620" cy="70" r="40" fill="#fbbf24"/>
  <g stroke="#fbbf24" stroke-width="3">
    <line x1="620" y1="15" x2="620" y2="5"/>
    <line x1="620" y1="125" x2="620" y2="135"/>
    <line x1="565" y1="70" x2="555" y2="70"/>
    <line x1="675" y1="70" x2="685" y2="70"/>
    <line x1="581" y1="31" x2="574" y2="24"/>
    <line x1="659" y1="109" x2="666" y2="116"/>
    <line x1="581" y1="109" x2="574" y2="116"/>
    <line x1="659" y1="31" x2="666" y2="24"/>
  </g>

  <!-- Cloud -->
  <g fill="white" opacity="0.9">
    <circle cx="300" cy="80" r="30"/>
    <circle cx="340" cy="70" r="40"/>
    <circle cx="380" cy="80" r="30"/>
    <circle cx="330" cy="95" r="25"/>
    <circle cx="360" cy="95" r="25"/>
  </g>

  <!-- Evaporation arrows -->
  <g stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="6,4">
    <path d="M120,350 Q110,250 280,110"/>
    <path d="M160,350 Q170,260 320,110"/>
  </g>

  <!-- Rain drops -->
  <g fill="#3b82f6" opacity="0.7">
    <ellipse cx="310" cy="140" rx="2" ry="5"/>
    <ellipse cx="330" cy="155" rx="2" ry="5"/>
    <ellipse cx="350" cy="140" rx="2" ry="5"/>
    <ellipse cx="370" cy="160" rx="2" ry="5"/>
    <ellipse cx="340" cy="175" rx="2" ry="5"/>
    <ellipse cx="360" cy="180" rx="2" ry="5"/>
  </g>

  <!-- Runoff arrow -->
  <path d="M400,350 Q450,360 200,385" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Labels -->
  <text x="620" y="130" font-family="sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">Sun</text>
  <text x="340" y="55" font-family="sans-serif" font-size="12" fill="#374151" text-anchor="middle" font-weight="bold">Cloud</text>
  <text x="90" y="255" font-family="sans-serif" font-size="11" fill="#2563eb" font-weight="bold">Evaporation</text>
  <text x="390" y="210" font-family="sans-serif" font-size="11" fill="#2563eb" font-weight="bold">Precipitation</text>
  <text x="400" y="400" font-family="sans-serif" font-size="11" fill="#1e40af" font-weight="bold">Runoff</text>
  <text x="150" y="385" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Lake</text>

  <!-- Title -->
  <text x="350" y="430" font-family="sans-serif" font-size="16" fill="#1f2937" text-anchor="middle" font-weight="bold">The Water Cycle</text>
</svg>
